<div class="min-h-screen px-8 py-4">
  <div class="mx-auto" style="max-width: 1400px">
    <!-- Header -->
    <header class="mb-3 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold glow-text mb-1" style="color: var(--accent-cyan)">{{ title() }}</h1>
        <p class="text-xs" style="color: var(--text-secondary)">Kubectl Commands Visualized</p>
      </div>
      <div class="mode-toggle flex rounded-md overflow-hidden border" style="border-color: var(--border-subtle)">
        <button
          class="mode-btn px-3 py-1.5 text-xs font-medium transition-all"
          [class.mode-active]="!mockModeService.isMockMode()"
          (click)="mockModeService.setMockMode(false)">
          Realtime
        </button>
        <button
          class="mode-btn px-3 py-1.5 text-xs font-medium transition-all"
          [class.mode-active]="mockModeService.isMockMode()"
          [disabled]="!mockModeService.mockAvailable()"
          [title]="mockModeService.mockAvailable() ? 'Use mock backup data' : 'No mock data available'"
          (click)="mockModeService.setMockMode(true)">
          Mock Data
        </button>
      </div>
    </header>

    <div class="space-y-3">
      <!-- Global Commands -->
      <app-command-chips
        [groups]="globalChipGroup()"
        [disabled]="isBusy()"
        (templateExecute)="executeTemplate($event)"
      />

      <!-- Context Bar -->
      <app-context-bar
        [namespaces]="namespaces()"
        [selectedNamespace]="selectedNamespace()"
        [isLoading]="isInitializing()"
        [resources]="resourceDropdowns()"
        [resourceCounts]="resourceCounts()"
        [disabled]="isBusy()"
        (namespaceChange)="onNamespaceChange($event)"
        (resourceChange)="onResourceChange($event)"
        (resourceExpand)="onResourceExpand($event)"
      />

      <!-- Resource Command Chips (includes inline Rollout Console + ECR Tag Picker) -->
      <app-command-chips
        [groups]="resourceChipGroups()"
        [disabled]="isBusy()"
        [ecrTags]="ecrService.tags()"
        [ecrIsLoading]="ecrService.isLoading()"
        [ecrError]="ecrService.error()"
        [deploymentImage]="deploymentImage()"
        [deploymentName]="selectedDeployment()"
        [isRolloutExpanded]="isRolloutConsoleExpanded()"
        [rolloutTemplates]="rolloutTemplates"
        [deploymentStatus]="deploymentStatus()"
        [buttonStates]="buttonStates()"
        [rolloutHistory]="rolloutHistory()"
        (templateExecute)="executeTemplate($event)"
        (loadEcrTags)="onLoadEcrTags()"
        (ecrTagSelect)="onEcrTagSelect($event)"
        (toggleRolloutExpanded)="onToggleRolloutConsole()"
        (imageUpgrade)="onImageUpgrade($event)"
      />

      <!-- Command Input -->
      <app-command-input
        [command]="customCommand()"
        [isLoading]="isBusy()"
        (commandChange)="onCustomCommandChange($event)"
        (commandExecute)="executeCustomCommand()"
        (keyDown)="onCommandInputKeyDown($event)"
      />

      <!-- Output Display (full width) -->
      <app-output-display
        [data]="outputData()"
      />
    </div>
  </div>

  <!-- Execution Toast (top-right) -->
  <app-execution-dialog></app-execution-dialog>
</div>

<router-outlet />
