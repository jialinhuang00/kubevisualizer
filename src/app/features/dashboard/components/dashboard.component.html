<div class="min-h-screen p-3">
  <div class="max-w-7xl mx-auto">
    <header class="mb-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold glow-text mb-1" style="color: var(--accent-cyan)">{{ title() }}</h1>
        <p class="text-xs" style="color: var(--text-secondary)">Kubectl Commands Visualized</p>
      </div>
      <div class="mode-toggle flex rounded-md overflow-hidden border" style="border-color: var(--border-subtle)">
        <button
          class="mode-btn px-3 py-1.5 text-xs font-medium transition-all"
          [class.mode-active]="!mockModeService.isMockMode()"
          (click)="mockModeService.setMockMode(false)">
          Realtime
        </button>
        <button
          class="mode-btn px-3 py-1.5 text-xs font-medium transition-all"
          [class.mode-active]="mockModeService.isMockMode()"
          [disabled]="!mockModeService.mockAvailable()"
          [title]="mockModeService.mockAvailable() ? 'Use mock backup data' : 'No mock data available'"
          (click)="mockModeService.setMockMode(true)">
          Mock Data
        </button>
      </div>
    </header>

    <div class="grid grid-cols-[350px_1fr] gap-4">
      <!-- Sidebar: Commands -->
      <app-command-sidebar
        [data]="sidebarData()"
        (namespaceChange)="onNamespaceChange($event)"
        (deploymentChange)="onDeploymentChange($event)"
        (podChange)="onPodChange($event)"
        (serviceChange)="onServiceChange($event)"
        (templateExecute)="executeTemplate($event)"
        (imageUpgrade)="onImageUpgrade($event)">
      </app-command-sidebar>

      <!-- Main Content Area -->
      <div class="space-y-3 overflow-x-auto">
        <!-- Custom Command Input -->
        <app-command-input
          [command]="customCommand()"
          [isLoading]="isLoading()"
          (commandChange)="onCustomCommandChange($event)"
          (commandExecute)="executeCustomCommand()"
          (keyDown)="onCommandInputKeyDown($event)">
        </app-command-input>

        <!-- Command Output & Visualization -->
        <app-output-display
          [data]="outputData()">
        </app-output-display>
      </div>
    </div>
  </div>
  
  <!-- Execution Dialog (Modal Overlay) -->
  <app-execution-dialog></app-execution-dialog>
</div>

<router-outlet />
