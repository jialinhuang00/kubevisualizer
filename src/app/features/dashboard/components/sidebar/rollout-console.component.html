@if (deploymentName) {
<div class="rollout-console">
  <!-- Compact toggle row -->
  <div class="rollout-toggle" (click)="onToggleExpanded()">
    <span class="rollout-toggle-label">
      Rollout
      @if (deploymentStatus && buttonStates) {
        <span class="status-text">{{ getStatusText() }}</span>
      }
    </span>
    <div class="rollout-toggle-right">
      <!-- Status Lights -->
      <div class="status-lights">
        <div class="status-dot" [style.background-color]="getStatusColor('red')"></div>
        <div class="status-dot" [style.background-color]="getStatusColor('yellow')"></div>
        <div class="status-dot" [style.background-color]="getStatusColor('green')"></div>
      </div>
      <span class="toggle-arrow" [class.expanded]="isExpanded">&#9662;</span>
    </div>
  </div>

  <!-- Expandable content -->
  <div class="rollout-body" [class.expanded]="isExpanded">
    <!-- Player Controls -->
    <div class="player-row">
      <button class="player-btn rollback-btn"
        [title]="getRollbackTooltip()" [disabled]="!buttonStates?.rollbackEnabled"
        [class.disabled]="!buttonStates?.rollbackEnabled" (click)="onRollbackToPrevious()">
        <mat-icon>skip_previous</mat-icon>
      </button>
      <button class="player-btn pause-btn"
        [title]="getPauseTooltip()" [disabled]="!buttonStates?.pauseEnabled"
        [class.disabled]="!buttonStates?.pauseEnabled" (click)="onPauseRollout()">
        <mat-icon>pause</mat-icon>
      </button>
      <button class="player-btn play-btn"
        [title]="getResumeTooltip()" [disabled]="!buttonStates?.resumeEnabled"
        [class.disabled]="!buttonStates?.resumeEnabled" (click)="onResumeRollout()">
        <mat-icon>play_arrow</mat-icon>
      </button>
      <button class="player-btn restart-btn"
        [title]="getRestartTooltip()" [disabled]="!buttonStates?.restartEnabled"
        [class.disabled]="!buttonStates?.restartEnabled" (click)="onRestartDeployment()">
        <mat-icon>refresh</mat-icon>
      </button>
      <span class="player-spacer"></span>
      <button class="player-btn refetch-btn" title="Refetch deployment status" (click)="refetchStatus.emit()">
        <mat-icon>sync</mat-icon>
      </button>
    </div>

    <!-- ECR Tags -->
    @if (isEcrImage()) {
      <div class="ecr-row">
        <div class="ecr-label">
          ECR
          <span class="ecr-image-url">{{ deploymentImage }}</span>
        </div>
        <div class="ecr-tags">
          <button class="ecr-btn" (click)="onLoadTags()" [disabled]="ecrIsLoading">
            {{ ecrIsLoading ? 'Loading...' : 'Load Tags' }}
          </button>
          @if (ecrError) {
            <span class="ecr-error" [title]="ecrError">Error</span>
          }
          @if (ecrTags.length > 0) {
            <select class="ecr-select" [value]="selectedEcrTag()" (change)="selectedEcrTag.set($any($event.target).value)">
              <option value="" disabled>Select tag...</option>
              @for (tag of ecrTags; track tag) {
                <option [value]="tag">{{ tag }}</option>
              }
            </select>
            <button class="ecr-btn" [disabled]="!selectedEcrTag()" (click)="onSelectTag(selectedEcrTag())">Set Image</button>
          }
        </div>
      </div>
    }
  </div>
</div>
}
