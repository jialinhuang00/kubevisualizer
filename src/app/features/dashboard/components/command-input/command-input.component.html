<div class="command-input-container">
  <div class="section-header">
    <span class="section-title">Command Interface</span>
  </div>
  <div class="section-body">
    <div class="input-row">
      <input
        type="text"
        class="command-field"
        placeholder="kubectl get pods -n noah"
        [value]="command"
        (input)="onCommandChange($event)"
        (keydown)="onKeyDown($event)">
      @if (isStreaming) {
        <button class="execute-btn stop" (click)="onStop()">STOP</button>
      } @else {
        <button class="execute-btn" (click)="onExecute()">EXECUTE</button>
      }
    </div>
    <div class="help-text">
      Supports: -o yaml/json/wide/custom-columns • jsonpath • --no-headers • Cmd+Enter to execute
    </div>
  </div>
</div>
