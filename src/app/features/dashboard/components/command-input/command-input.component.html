<div class="command-input-container">
  <div class="section-header">
    <span class="section-title">Command Interface</span>
  </div>
  <div class="section-body">
    <div class="input-row">
      <input
        type="text"
        class="command-field"
        placeholder="kubectl get pods -n noah"
        [value]="command"
        (input)="onCommandChange($event)"
        (keydown)="onKeyDown($event)">
      <button
        class="execute-btn"
        [disabled]="isLoading"
        (click)="onExecute()">
        {{ isLoading ? 'EXECUTING...' : 'EXECUTE' }}
      </button>
    </div>
    <div class="help-text">
      Supports: -o yaml/json/wide/custom-columns • jsonpath • --no-headers • Cmd+Enter to execute
    </div>
  </div>
</div>
